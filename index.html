<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat Interface</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Fonts: Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <!-- marked.js — Markdown parser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════
     APP SHELL  (flex row: sidebar + main)
═══════════════════════════════════════════ -->
<div class="app-shell" id="appShell">

  <!-- ── SIDEBAR ─────────────────────────── -->
  <aside class="sidebar" id="sidebar" aria-label="Conversations">

    <div class="sidebar__head">
      <div class="sidebar__brand">
        <span class="logo-mark" aria-hidden="true"></span>
        <span class="sidebar__brand-name">AI Chat</span>
      </div>
      <button class="btn-icon" id="btnNewChat" title="New chat" aria-label="New conversation">
        <!-- Plus icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5"  y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- Injected by JS -->
    <nav class="sidebar__nav" id="convList" aria-label="Conversation list"></nav>

    <div class="sidebar__foot">
      <button class="theme-toggle" id="themeToggle"
              aria-label="Toggle theme" title="Switch theme">
        <!-- Sun (visible in dark mode) -->
        <svg class="icon icon--sun" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1"  x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22"  y1="4.22"  x2="5.64"  y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1"  y1="12" x2="3"  y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
          <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon (visible in light mode) -->
        <svg class="icon icon--moon" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <span id="themeLabel">Light mode</span>
      </button>
    </div>
  </aside>

  <!-- Mobile sidebar backdrop -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ── MAIN PANEL ──────────────────────── -->
  <div class="main-panel">

    <!-- Header -->
    <header class="header">
      <!-- Hamburger (mobile) -->
      <button class="btn-icon btn-hamburger" id="btnHamburger"
              aria-label="Toggle sidebar" title="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="3"  y1="6"  x2="21" y2="6"/>
          <line x1="3"  y1="12" x2="21" y2="12"/>
          <line x1="3"  y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <h1 class="header__title" id="headerTitle">New Conversation</h1>

      <!-- Delete current chat -->
      <button class="btn-icon btn-delete" id="btnDeleteChat"
              aria-label="Delete conversation" title="Delete this chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
      </button>
    </header>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages"
         role="log" aria-live="polite" aria-label="Chat messages"></div>

    <!-- Scroll FAB -->
    <button class="scroll-fab" id="scrollFab"
            aria-label="Jump to latest" title="Jump to bottom">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>

    <!-- Input bar -->
    <div class="input-bar">
      <div class="input-bar__inner">
        <textarea id="messageInput" class="input-bar__textarea"
          placeholder="Message AI Chat…" rows="1" maxlength="4000"
          aria-label="Message input" autocomplete="off" spellcheck="true"></textarea>
        <button class="send-btn" id="sendBtn"
                aria-label="Send" title="Send (Enter)" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-bar__hint">
        <span id="charCount">0</span>/4000 &nbsp;·&nbsp;
        <kbd>Enter</kbd> send &nbsp;<kbd>Shift+Enter</kbd> newline
      </p>
    </div>

  </div><!-- /main-panel -->
</div><!-- /app-shell -->

<script src="script.js"></script>
</body>
</html>
